<h2>Registration</h2>

    <form action="study_plan.html" id="contactform">

        <div class="mb-3">
            <label for="fullname" class="form-label">Name: *</label><br/>
        <input required type="text" class="form-control" id="fullname" name="fullname" 
        placeholder="Mac lo" />
        </div>
<br/>
<br/>

<div class="mb-3">
            <label for="number" class="form-label">Telephone Number: *</label><br/>
        <input required type="tel" class="form-control" id="number" name="number" 
        placeholder="888-888-888" />
        </div>
<br/>
<br/>

  <div class="mb-3">
            <label for="email" class="form-label">Emailaddress: *</label><br/>
        <input required type="email" class="form-control" id="email" name="emailaddress" 
        placeholder="Mac@gmail.com" />
        </div>
<br/>
<br/>
        <div class="mb-3">
            <label class="form-label">Are you employed?</label><br/>
             <input id="yesemployed" type="radio" value="y" name="employed" class="form-check-input"/>
             <label class="form-check-label" for="yes employed">yes
  </label>
  <input id="notemployed" type="radio" value="N" name="employed" class="form-check-input"/>
             <label class="form-check-label" for="Not employed">no
  </label>
  <br/>
<br/>
<label class="form-label">Are you a student?</label><br/>
             <input id="yesstudent" type="radio" value="y" name="student" class="form-check-input"/>
             <label class="form-check-label" for="yes student">yes
  </label>
          <input id="notstudent" type="radio" value="N"name="student" class="form-check-input"/>
             <label class="form-check-label" for="Not student">no
  </label>  
<br/>
<br/>
  <label class="form-label">What level are You?</label><br/>
             <input id="yessecondary" type="radio" value="y" name="secondary" class="form-check-input"/>
             <label class="form-check-label" for="yes secondary">Secondary
             </label>
  </label>
          <input id="yesTertiary" type="radio" value="N"name="Tertiary" class="form-check-input"/>
             <label class="form-check-label" for="yes Tertiary">Tertiary
  </label>  

<br/>
<br/><br/>

<div class="mb-3">

   <br/>

  <br/>
<br/>
